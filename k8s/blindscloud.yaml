apiVersion: v1
kind: Namespace
metadata:
  name: blindscloud
---
apiVersion: v1
kind: Secret
metadata:
  name: blindscloud-secrets
  namespace: blindscloud
type: Opaque
stringData:
  JWT_SECRET: change-me
  MONGO_ROOT_USER: admin
  MONGO_ROOT_PASSWORD: change-me
  MONGO_URL: mongodb://admin:change-me@mongo:27017/admin
  RABBITMQ_USER: admin
  RABBITMQ_PASSWORD: change-me
  RABBITMQ_URL: amqp://admin:change-me@rabbitmq:5672
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blindscloud-config
  namespace: blindscloud
data:
  CORS_ORIGINS: "https://your-frontend-domain.com"
  EVENT_EXCHANGE: "blindscloud.events"
  AUTH_SERVICE_URL: "http://auth-service:4001"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: blindscloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: blindscloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: blindscloud
spec:
  selector:
    app: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: blindscloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: blindscloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: RABBITMQ_PASSWORD
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: blindscloud
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: blindscloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: blindscloud/api-gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: blindscloud-config
                  key: CORS_ORIGINS
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: blindscloud-config
                  key: AUTH_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: blindscloud
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: blindscloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: blindscloud/auth-service:latest
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: EVENT_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: blindscloud-config
                  key: EVENT_EXCHANGE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: JWT_SECRET
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: MONGO_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: blindscloud-secrets
                  key: RABBITMQ_URL
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: blindscloud
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blindscloud-ingress
  namespace: blindscloud
spec:
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
