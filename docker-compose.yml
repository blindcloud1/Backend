services:
  mongo:
    image: mongo:7
    container_name: blindscloud-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me}
    volumes:
      - mongo-data:/data/db
    networks:
      - blindscloud-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: blindscloud-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:15672:15672"
    networks:
      - blindscloud-net

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: blindscloud-auth-service
    restart: unless-stopped
    environment:
      PORT: 4001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
      SEED_DEMO: ${SEED_DEMO:-true}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  users-service:
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    container_name: blindscloud-users-service
    restart: unless-stopped
    environment:
      PORT: 4002
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  businesses-service:
    build:
      context: .
      dockerfile: services/businesses-service/Dockerfile
    container_name: blindscloud-businesses-service
    restart: unless-stopped
    environment:
      PORT: 4003
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  customers-service:
    build:
      context: .
      dockerfile: services/customers-service/Dockerfile
    container_name: blindscloud-customers-service
    restart: unless-stopped
    environment:
      PORT: 4004
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  jobs-service:
    build:
      context: .
      dockerfile: services/jobs-service/Dockerfile
    container_name: blindscloud-jobs-service
    restart: unless-stopped
    environment:
      PORT: 4005
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  products-service:
    build:
      context: .
      dockerfile: services/products-service/Dockerfile
    container_name: blindscloud-products-service
    restart: unless-stopped
    environment:
      PORT: 4006
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    container_name: blindscloud-pricing-service
    restart: unless-stopped
    environment:
      PORT: 4007
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change}
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-change-me}@mongo:27017/admin}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-change-me}@rabbitmq:5672}
      EVENT_EXCHANGE: ${EVENT_EXCHANGE:-blindscloud.events}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - blindscloud-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: blindscloud-api-gateway
    restart: unless-stopped
    environment:
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      AUTH_SERVICE_URL: http://auth-service:4001
      USERS_SERVICE_URL: http://users-service:4002
      BUSINESSES_SERVICE_URL: http://businesses-service:4003
      CUSTOMERS_SERVICE_URL: http://customers-service:4004
      JOBS_SERVICE_URL: http://jobs-service:4005
      PRODUCTS_SERVICE_URL: http://products-service:4006
      PRICING_SERVICE_URL: http://pricing-service:4007
    ports:
      - "3001:3001"
    depends_on:
      - auth-service
      - users-service
      - businesses-service
      - customers-service
      - jobs-service
      - products-service
      - pricing-service
    networks:
      - blindscloud-net

networks:
  blindscloud-net:
    driver: bridge

volumes:
  mongo-data:
